<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Tinkal</title>
  <link rel="icon" type="image/png" href="../https://www.genspark.ai/api/files/s/k0PaGPv7"/>
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body class="admin-body">

<div class="admin-login-wrap">
  <div class="admin-login-card">
    <div class="admin-login-logo">
      <img src="https://www.genspark.ai/api/files/s/k0PaGPv7" alt="Tinkal" onerror="this.style.display='none'" style="height:52px;margin:0 auto 12px;"/>
      <h2>Tinkal Admin Panel</h2>
      <p>Authorized access only</p>
    </div>
    <div class="admin-login-err" id="loginErr">
      <i class="fas fa-exclamation-circle"></i> Invalid credentials. Please try again.
    </div>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Admin ID</label>
        <div style="position:relative;">
          <input type="text" class="form-input" id="adminId" placeholder="Enter admin ID" autocomplete="off" required style="padding-left:44px;"/>
          <i class="fas fa-user" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text2);"></i>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:28px;">
        <label class="form-label">Password</label>
        <div style="position:relative;">
          <input type="password" class="form-input" id="adminPass" placeholder="Enter password" required style="padding-left:44px;padding-right:44px;"/>
          <i class="fas fa-lock" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text2);"></i>
          <i class="fas fa-eye" id="togglePass" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text2);cursor:pointer;" onclick="togglePassword()"></i>
        </div>
      </div>
      <button type="submit" class="btn-submit">
        <i class="fas fa-sign-in-alt"></i> Login to Admin Panel
      </button>
    </form>
    <div style="text-align:center;margin-top:20px;">
      <a href="../index.html" style="font-size:13px;color:var(--text2);"><i class="fas fa-arrow-left"></i> Back to website</a>
    </div>
  </div>
</div>

<script src="../assets/js/firebase-config.js"></script>
<script>
  // Redirect if already logged in
  if (isAdminLoggedIn()) window.location.href = 'dashboard.html';

  function handleLogin(e) {
    e.preventDefault();
    const id = document.getElementById('adminId').value.trim();
    const pass = document.getElementById('adminPass').value;
    const errEl = document.getElementById('loginErr');
    if (adminLogin(id, pass)) {
      window.location.href = 'dashboard.html';
    } else {
      errEl.classList.add('show');
      document.getElementById('adminPass').value = '';
      setTimeout(() => errEl.classList.remove('show'), 3000);
    }
  }

  function togglePassword() {
    const inp = document.getElementById('adminPass');
    const icon = document.getElementById('togglePass');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.className = 'fas fa-eye-slash';
    } else {
      inp.type = 'password';
      icon.className = 'fas fa-eye';
    }
  }
</script>
</body>
</html>
